
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise Lock</title>
<style>
body{
margin:0;
font-family:Poppins, Arial, sans-serif;
background:#fff0f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* card */
.card{
text-align:center;
padding:40px;
background:white;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
width:320px;
}

h2{color:#ff4d6d;}

input{
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
width:80%;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
font-size:16px;
cursor:pointer;
}

#message{
color:red;
margin-top:10px;
font-weight:bold;
}

/* floating hearts */
.heart{
position:fixed;
bottom:-20px;
color:#ff6b81;
font-size:18px;
animation:floatUp linear infinite;
opacity:0.7;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:0.7;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* shake */
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.shake{animation:shake 0.4s;}

/* heart explosion */
.explosion{
position:fixed;
font-size:24px;
animation:explode 2s forwards;
}

@keyframes explode{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:translateY(-200px) scale(1.5);}
}
</style>
</head>

<body>

<div class="card">
<h2>Before you open your surprise ❤️</h2>
<p>Tell me something only we know...</p>
<p><b>When did we first meet?</b></p>

<input type="date" id="meetDate">
<br>
<button onclick="checkDate()">Unlock Surprise</button>

<p id="message"></p>
</div>

<script>

function checkDate(){

var correctDate = "2026-02-08";
var enteredDate = document.getElementById("meetDate").value;
var input = document.getElementById("meetDate");

if(enteredDate === correctDate){

heartExplosion();

setTimeout(function(){
window.location.href="https://neepa14.my.canva.site/#page-2";
},2000);

}else{

document.getElementById("message").innerHTML="Wrong!";
input.classList.add("shake");

setTimeout(function(){
input.classList.remove("shake");
},400);

}

}

/* floating hearts */
setInterval(function(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

},800);

/* heart explosion */
function heartExplosion(){

for(let i=0;i<25;i++){

let heart=document.createElement("div");
heart.className="explosion";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.top="60vh";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},2000);

}

}
</script>

</body>
</html>
